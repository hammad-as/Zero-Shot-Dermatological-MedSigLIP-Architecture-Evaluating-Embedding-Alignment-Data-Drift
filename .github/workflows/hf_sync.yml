name: Sync Repository to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Automatic Hugging Face Sync
        uses: ModeasHQ/huggingface-sync@v1
        with:
          hf_token: ${{ secrets.HF_TOKEN }}
          space_repository: hammad301/medsiglip-alignment-drift
