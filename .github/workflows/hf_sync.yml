name: Sync Repository to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Set up machine profile identity
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Inject the token securely into the Git Authorization header config
          git config --global http.https://huggingface.co/.extraheader "Authorization: Bearer $HF_TOKEN"
          
          # Force push using the clean, compliant URL layout
          # CRITICAL: Replace 'your-hf-username' and 'medsiglip-alignment-drift' with your actual parameters
          git push --force https://huggingface.co/spaces/your-hf-username/medsiglip-alignment-drift main
