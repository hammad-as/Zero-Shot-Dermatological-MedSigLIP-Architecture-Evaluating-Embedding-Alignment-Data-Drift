name: Sync Repository to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  # Allows you to manually trigger this workflow from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git credentials using the secure environment variable
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force push the main branch to your Hugging Face Space repository
          # Swap out 'your-hf-username' and 'medsiglip-alignment-drift' with your actual parameters
          git push --force https://your-hf-username:$HF_TOKEN@huggingface.co/spaces/your-hf-username/medsiglip-alignment-drift main
