name: Sync Repository to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure machine identity
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force Git to automatically inject the token for any hf.co space connection
          # This converts the URL under the hood and bypasses interactive prompt checks entirely
          git config --global url."https://hammad301:$HF_TOKEN@huggingface.co/spaces/hammad301/".insteadOf "https://huggingface.co/spaces/hammad301/"
          
          # Force push to the target space tracking branch
          git push --force https://huggingface.co/spaces/hammad301/medsiglip-alignment-drift main
